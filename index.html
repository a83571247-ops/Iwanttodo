<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인크래프트 지형의 마리오 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 마리오 하늘색 배경 */
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            image-rendering: pixelated; /* 픽셀 아트 스타일 강조 */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="480"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 게임 설정
const GRAVITY = 0.6;
const BLOCK_SIZE = 32; // 각 블록의 크기 (32x32 픽셀)
const COLS = canvas.width / BLOCK_SIZE; // 25칸
const ROWS = canvas.height / BLOCK_SIZE; // 15칸

// 블록 종류별 색상 정의 (마인크래프트 스타일 픽셀)
const BLOCK_TYPES = {
    DIRT: { main: '#866043', detail: '#573d26' },
    STONE: { main: '#737373', detail: '#525252' },
    COAL: { main: '#737373', detail: '#1c1c1c' },
    DIAMOND: { main: '#737373', detail: '#4dedf4' }
};

// 지형 맵 배열 생성 (2차원 배열)
const map = [];

// 요청하신 규칙대로 5개 층 지형 생성
for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
        // 밑에서부터 5개 층 계산 (ROWS-5 부터 ROWS-1 까지)
        let groundLevel = ROWS - r; 

        if (groundLevel === 5 || groundLevel === 4) {
            // 밑에서 5번째, 4번째 줄: 흙
            map[r][c] = 'DIRT';
        } else if (groundLevel === 3) {
            // 밑에서 3번째 줄: 돌
            map[r][c] = 'STONE';
        } else if (groundLevel === 2) {
            // 밑에서 2번째 줄: 돌 + 석탄 무작위 (석탄 확률 30%)
            map[r][c] = Math.random() < 0.3 ? 'COAL' : 'STONE';
        } else if (groundLevel === 1) {
            // 맨 밑줄: 돌 + 석탄 + 다이아몬드 무작위 (다이아 10%, 석탄 20%)
            let rand = Math.random();
            if (rand < 0.1) map[r][c] = 'DIAMOND';
            else if (rand < 0.3) map[r][c] = 'COAL';
            else map[r][c] = 'STONE';
        } else {
            // 그 위는 공기(하늘)
            map[r][c] = null;
        }
    }
}

// 마리오 캐릭터 설정 (지형 위에 사뿐히 내려앉도록 초기 Y축 조절)
const mario = {
    x: 50,
    y: canvas.height - (BLOCK_SIZE * 5) - 40,
    width: 24,
    height: 36,
    color: '#e60012',
    dx: 0,
    dy: 0,
    speed: 4,
    jumpForce: 11,
    grounded: false
};

// 키보드 입력 상태
const keys = { ArrowRight: false, ArrowLeft: false, ArrowUp: false };

window.addEventListener('keydown', (e) => {
    if (e.key in keys) {
        keys[e.key] = true;
        if (e.key === 'ArrowUp' && mario.grounded) {
            mario.dy = -mario.jumpForce;
            mario.grounded = false;
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key in keys) keys[e.key] = false;
});

// 블록 그리기 함수 (픽셀 텍스처 느낌 내기)
function drawBlock(type, x, y) {
    const colors = BLOCK_TYPES[type];
    ctx.fillStyle = colors.main;
    ctx.fillRect(x, y, BLOCK_SIZE, BLOCK_SIZE);

    // 픽셀 스타일 디테일 점 찍기
    ctx.fillStyle = colors.detail;
    if (type === 'DIRT') {
        ctx.fillRect(x+4, y+4, 4, 4);
        ctx.fillRect(x+16, y+12, 6, 4);
        ctx.fillRect(x+8, y+24, 4, 4);
    } else if (type === 'STONE') {
        ctx.fillRect(x+2, y+6, 6, 4);
        ctx.fillRect(x+18, y+16, 8, 4);
    } else if (type === 'COAL' || type === 'DIAMOND') {
        // 광석 테두리(돌) 안에 박힌 보석 표현
        ctx.fillRect(x+2, y+6, 6, 4); 
        ctx.fillStyle = colors.detail; // 검은색(석탄) 또는 하늘색(다이아) 광석 칩
        ctx.fillRect(x+8, y+8, 6, 6);
        ctx.fillRect(x+18, y+18, 6, 6);
        ctx.fillRect(x+6, y+22, 4, 4);
    }
    
    // 블록 테두리 선 (그리드 느낌)
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.strokeRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
}

function update() {
    // 이동
    if (keys.ArrowRight) mario.dx = mario.speed;
    else if (keys.ArrowLeft) mario.dx = -mario.speed;
    else mario.dx = 0;

    mario.dy += GRAVITY;
    mario.x += mario.dx;
    mario.y += mario.dy;

    // 화면 좌우 이탈 방지
    if (mario.x < 0) mario.x = 0;
    if (mario.x + mario.width > canvas.width) mario.x = canvas.width - mario.width;

    // 블록 충돌 구현 (바닥 체크)
    mario.grounded = false;
    
    // 마리오가 밟고 서있을 수 있는 Y축 기준점 (땅의 표면)
    const groundY = canvas.height - (BLOCK_SIZE * 5);

    if (mario.y + mario.height >= groundY) {
        mario.y = groundY - mario.height;
        mario.dy = 0;
        mario.grounded = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 마인크래프트식 맵 그리기
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c]) {
                drawBlock(map[r][c], c * BLOCK_SIZE, r * BLOCK_SIZE);
            }
        }
    }

    // 2. 마리오 캐릭터 그리기
    ctx.fillStyle = mario.color;
    ctx.fillRect(mario.x, mario.y, mario.width, mario.height);
    // 멜빵바지
    ctx.fillStyle = '#0020b8';
    ctx.fillRect(mario.x + 4, mario.y + 18, mario.width - 8, mario.height - 18);
    // 얼굴과 모자
    ctx.fillStyle = '#fcbcb0';
    ctx.fillRect(mario.x + 4, mario.y + 4, mario.width - 8, 14);
    ctx.fillStyle = mario.color;
    ctx.fillRect(mario.x + 2, mario.y, mario.width - 4, 6);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
