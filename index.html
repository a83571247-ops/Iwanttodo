<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마리오 그리드 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘 배경색 */
            border: 4px solid #fff;
            image-rendering: pixelated; /* 픽셀 아트 스타일 */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 화면 및 그리드 설정 ---
const BLOCK_SIZE = 24; // 한 칸의 크기 (픽셀)
const COLS = 50;       // 가로 50칸
const ROWS = 30;       // 세로 30칸

canvas.width = COLS * BLOCK_SIZE;  // 1200 픽셀
canvas.height = ROWS * BLOCK_SIZE; // 720 픽셀

const GRAVITY = 0.5;

// --- 2. 블록 데이터 정의 ---
const BLOCK_TYPES = {
    DIRT:    { id: 1, main: '#866043', detail: '#573d26' },
    STONE:   { id: 2, main: '#737373', detail: '#525252' },
    COAL:    { id: 3, main: '#737373', detail: '#1c1c1c' },
    DIAMOND: { id: 4, main: '#737373', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// --- 3. 2차원 배열 지형 생성 (위에서부터 5칸만 땅) ---
const map = [];
for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
        if (r < 5) {
            // 0~4번째 줄(위에서 5칸)은 무작위 물질로 채움
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            map[r][c] = BLOCK_TYPES[randomType];
        } else {
            // 그 아래 25칸은 빈 공간(하늘)
            map[r][c] = null;
        }
    }
}

// --- 4. 캐릭터 설정 ---
// 지형(0~4층) 내부에서 시작하면 갇히므로, 땅 바로 아래(5층째)에 배치
const player = {
    x: 100,
    y: 5 * BLOCK_SIZE, 
    width: 20,
    height: 20,
    color: '#e60012',
    dx: 0,
    dy: 0,
    speed: 4,
    jumpForce: 10,
    grounded: false
};

// --- 5. 키보드 입력 설정 ---
const keys = { ArrowRight: false, ArrowLeft: false, ArrowUp: false };

window.addEventListener('keydown', (e) => {
    if (e.key in keys) {
        keys[e.key] = true;
        if (e.key === 'ArrowUp' && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key in keys) keys[e.key] = false;
});

// --- 6. 충돌 감지 함수 (AABB 방식) ---
function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width &&
           obj1.x + obj1.width > obj2.x &&
           obj1.y < obj2.y + obj2.height &&
           obj1.y + obj1.height > obj2.y;
}

// --- 7. 업데이트 및 핵심 충돌 로직 (벽 통과 방지) ---
function update() {
    // 좌우 이동 물리 적용
    if (keys.ArrowRight) player.dx = player.speed;
    else if (keys.ArrowLeft) player.dx = -player.speed;
    else player.dx = 0;

    // 중력 적용
    player.dy += GRAVITY;

    // --- X축 이동 및 충돌 체크 ---
    player.x += player.dx;
    // 화면 좌우 외곽선 통과 방지
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    // X축 기준 블록 충돌 검사
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c]) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
