<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 무한 마인크래프트 게임 (완성형)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* 카메라가 움직이므로 브라우저 스크롤바는 제거 */
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 기본 게임 환경 설정 ---
const BLOCK_SIZE = 50; 
const GRAVITY = 0.5;

const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 2차원 해시 구조의 월드 맵 데이터 저장소
const worldMap = {}; 
const GROUND_START_ROW = 20; // 지형이 시작되는 Y축 기준점

// 캐릭터 주변 및 화면 이동 시 무한으로 블록을 생성해주는 핵심 함수
function getBlock(r, c) {
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            worldMap[key] = {
                type: BLOCK_TYPES[randomType],
                damage: 0
            };
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터(피카츄) 상세 스펙 설정 ---
const player = {
    x: 1000, // 월드 중앙 부근에서 시작
    y: (GROUND_START_ROW * BLOCK_SIZE) - 100,
    baseWidth: 40,
    baseHeight: 44,
    width: 40,
    height: 44,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 13,
    grounded: false,
    facing: 'right',
    isCrouching: false
};

// --- 3. 부드러운 카메라 스크롤 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        // 플레이어를 언제나 화면 정중앙에 고정하여 카메라가 쫓아가게 만듦
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 조작 입력 처리 통합 (W, Space, Shift 버그 완전 해결) ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    // 대소문자 구분 없이 처리 및 특수 키 맵핑 보정
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = true;

        // [W] 키 또는 [Space]바를 눌렀을 때 둘 다 동일하게 점프 작동
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }

        // [Shift] 누르고 있으면 웅크리기 상태 돌입
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;

        // [Shift] 떼면 웅크리기 완전 해제
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

// 마우스 월드 계산을 위한 좌표 이벤트 리스너
canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

// 사각형 충돌 공식 (AABB)
function checkCollision(p, b) {
    return p.x < b.x + b.width &&
           p.x + p.width > b.x &&
           p.y < b.y + b.height &&
           p.y + p.height > b.y;
}

// --- 5. 실시간 물리 시스템 업데이트 ---
function update() {
    // 웅크리기 활성화 여부에 따른 실시간 물리 체격 변화
    if (player.isCrouching) {
        player.height = player.baseHeight * (2 / 3); // 원래 높이의 2/3 배율로 압축
        player.speed = 3.5;                         // 살금살금 걷도록 속도 하향 디테일
    } else {
        player.height = player.baseHeight;
        player.speed = 6;
    }

    // WASD 움직임 입력
    if (keys.d) {
        player.dx = player.speed;
        player.facing = 'right';
    } else if (keys.a) {
        player.dx = -player.speed;
        player.facing = 'left';
    } else {
        player.dx = 0;
    }

    player.dy += GRAVITY;

    // 플레이어 주변 범위 타일만 압축 연산하여 렉(Freeze) 차단
    const startRow = Math.floor((player.y - 100) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 150) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 100) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 100) / BLOCK_SIZE);

    // [X축 충돌 판정] 좌우로 막히는 벽 시스템
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // [Y축 충돌 판정] 아래 발판 착지 및 머리 위 천장 가로막기
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) {
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) {
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    // 카메라 위치 자동 동기화
    camera.update();

    // --- 마우스 실시간 블록 마인크래프트식 파괴 알고리즘 ---
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 30) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null; // 타일 데이터베이스에서 제거하여 영구 파괴
        }
    }

    // 시야 주변부 블록들의 서서히 갈라진 틈 자연 복구
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const b = getBlock(r, c);
            if (b && (r !== targetR || c !== targetC || !mouse.isDown)) {
                if (b.damage > 0) b.damage -= 0.5;
            }
        }
    }
}

// --- 6. 드로잉 그래픽 처리 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // 카메라 위치만큼 캔버스 그래픽을 밀어내어 무한 카메라 무빙 실현
    ctx.translate(-camera.x, -camera.y);

    // 카메라가 바라보는 시야 영역만 정밀하게 맵 탐색 후 드로우
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 8, by + 10, 10, 10);
                ctx.fillRect(bx + 28, by + 26, 12, 10);

                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 파괴 중 균열 크랙 이펙트
                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 25, by + 25);
                        ctx.moveTo(bx + 40, by + 10); ctx.lineTo(bx + 25, by + 25);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 25, by + 25); ctx.lineTo(bx + 20, by + 45);
                        ctx.moveTo(bx + 10, by + 35); ctx.lineTo(bx + 35, by + 40);
                    }
                    if (dmg >= 25) {
                        ctx.moveTo(bx + 5, by + 20); ctx.lineTo(bx + 45, by + 20);
                        ctx.moveTo(bx + 45, by + 5); ctx.lineTo(bx + 5, by + 45);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // 픽셀 피카츄 드로잉
    ctx.save();
    if (player.facing === 'left') {
        ctx.translate(player.x + player.width, player.y);
        ctx.scale(-1, 1);
    } else {
