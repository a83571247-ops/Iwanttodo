<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마리오 2000x1500 완성판 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto; /* 화면이 크므로 스크롤 허용 */
        }
        canvas {
            background-color: #74b9ff; /* 선명한 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 기본 설정 및 지형 크기 정의 ---
const BLOCK_SIZE = 50; // 블록 한 칸을 50x50 픽셀 크기로 큼직하게 설정
const COLS = canvas.width / BLOCK_SIZE;  // 가로 40칸
const ROWS = canvas.height / BLOCK_SIZE; // 세로 30칸

const GRAVITY = 0.5;

// 블록 색상 정의 (흙, 돌, 석탄, 다이아몬드)
const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// --- 2. 2차원 배열 지형 생성 (아래에서부터 확실하게 5칸 생성) ---
const map = [];
for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
        // 맨 아래에서부터 5줄(ROWS-5 줄부터 맨 밑 ROWS-1 줄까지)에 무작위 배치
        if (r >= ROWS - 5) {
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            map[r][c] = BLOCK_TYPES[randomType];
        } else {
            map[r][c] = null; // 위쪽 공간은 모두 하늘
        }
    }
}

// --- 3. 캐릭터(마리오) 설정 ---
// 아래에서 5칸이 땅이므로, 땅 바로 위(세로 25번째 칸 표면)에 배치하여 갇힘 방지
const player = {
    x: 150,
    y: (ROWS - 5) * BLOCK_SIZE - 60, // 땅 표면 바로 위
    width: 36,
    height: 50,
    color: '#e60012',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 13,
    grounded: false
};

// --- 4. 키보드 방향키 입력 제어 ---
const keys = { ArrowRight: false, ArrowLeft: false, ArrowUp: false };

window.addEventListener('keydown', (e) => {
    if (e.key in keys) {
        keys[e.key] = true;
        // 위쪽 방향키를 누르고 바닥에 서 있을 때만 점프 시동
        if (e.key === 'ArrowUp' && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key in keys) keys[e.key] = false;
});

// --- 5. AABB 사각형 충돌 감지 공식 ---
function checkCollision(p, b) {
    return p.x < b.x + b.width &&
           p.x + p.width > b.x &&
           p.y < b.y + b.height &&
           p.y + p.height > b.y;
}

// --- 6. 물리 업데이트 및 완벽한 벽/땅 통과 방지 알고리즘 ---
function update() {
    // 이동키 입력 제어
    if (keys.ArrowRight) player.dx = player.speed;
    else if (keys.ArrowLeft) player.dx = -player.speed;
    else player.dx = 0;

    // 중력 작동
    player.dy += GRAVITY;

    // [X축 처리] 좌우 이동 후 벽과 충돌하는지 체크
    player.x += player.dx;
    
    // 화면 좌우 밖으로 못 나가게 가두기
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    // X축 기준 블록 충돌 시 밀어내기 (벽 통과 차단)
    for (let r = ROWS - 5; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c]) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;      // 우측 벽 충돌
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width; // 좌측 벽 충돌
                }
            }
        }
    }

    // [Y축 처리] 상하 이동(점프/추락) 후 땅과 충돌하는지 체크
    player.y += player.dy;
    player.grounded = false;

    // 화면 맨 아래로 빠지는 예외 방지선
    if (player.y + player.height > canvas.height) {
        player.y = canvas.height - (5 * BLOCK_SIZE) - player.height;
        player.dy = 0;
        player.grounded = true;
    }

    // Y축 기준 블록 충돌 시 밀어내기 (바닥 착지 및 천장 차단)
    for (let r = ROWS - 5; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c]) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) { // 아래로 떨어지다 발이 땅에 닿음
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) { // 위로 점프하다 머리가 블록에 부딪힘
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }
}

// --- 7. 그래픽 렌더링 (화면에 그리기) ---
function draw() {
    // 이전 화면 깨끗하게 지우기
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 하단 5칸 무작위 픽셀 지형 그리기
    for (let r = ROWS - 5; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (map[r][c]) {
                const block = map[r][c];
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                // 블록 본체
                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 내부 픽셀 문양 장식
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 8, by + 10, 10, 10);
                ctx.fillRect(bx + 28, by + 26, 12, 10);

                // 블록 외곽 그리드 선선하게 추가
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);
            }
        }
    }

    // 캐릭터(마리오 사각형 모양) 그리기
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // 캐릭터 파란색 멜빵바지 표현
    ctx.fillStyle = '#0020b8';
    ctx.fillRect(player.x + 4, player.y + 20, player.width - 8, player.height - 20);

    // 눈동자 픽셀 장식 (좌우 방향 주시)
    ctx.fillStyle = '#000';
    if (keys.ArrowLeft) {
        ctx.fillRect(player.x + 6, player.y + 8, 6, 6);
    } else {
        ctx.fillRect(player.x + player.width - 12, player.y + 8, 6, 6);
    }
}

// --- 8. 실시간 메인 루프 실행 ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
