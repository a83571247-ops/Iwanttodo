<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 서바이벌 마인크래프트 - 완벽 수정판</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 환경 설정 ---
const BLOCK_SIZE = 60; 
const GRAVITY = 0.6;

// 블록 타입 정의
const BLOCK_TYPES = {
    GRASS:   { main: '#2ecc71', detail: '#27ae60' }, // 맨 위 전용 순수 초록색 잔디블록
    DIRT:    { main: '#866043', detail: '#573d26' }, // 일반 흙
    STONE:   { main: '#737373', detail: '#525252' }, // 돌
    COAL:    { main: '#3c3c3c', detail: '#111111' }, // 석탄
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }  // 다이아몬드
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

const worldMap = {}; 
const GROUND_START_ROW = 10; // 지표면 시작 층 (Y축)

// 지표면 위 자연 식물(잔디/꽃) 저장소
const decorationMap = {};
function getDecoration(r, c) {
    if (r === GROUND_START_ROW - 1) { 
        const key = `${r},${c}`;
        if (decorationMap[key] === undefined) {
            const rand = Math.random();
            if (rand < 0.15)      decorationMap[key] = 'LONG_GRASS';
            else if (rand < 0.20) decorationMap[key] = 'RED_FLOWER';
            else if (rand < 0.25) decorationMap[key] = 'YEL_FLOWER';
            else                  decorationMap[key] = null;
        }
        return decorationMap[key];
    }
    return null;
}

// 구름 데이터 저장소
const clouds = {};
function getCloud(r, c) {
    if (r < GROUND_START_ROW - 1) {
        const key = `${r},${c}`;
        if (clouds[key] === undefined) {
            clouds[key] = Math.random() < 0.08; 
        }
        return clouds[key];
    }
    return false;
}

// 무한 월드 지형 스폰 알고리즘
function getBlock(r, c) {
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            if (r === GROUND_START_ROW) {
                // 맨 위 블록은 무조건 초록색깔 잔디 블록(흙)으로만 구성
                worldMap[key] = { type: BLOCK_TYPES.GRASS, damage: 0 };
            } else if (r === GROUND_START_ROW + 1) {
                // 위에서 2번째 칸까지는 흙(DIRT)으로만 구성
                worldMap[key] = { type: BLOCK_TYPES.DIRT, damage: 0 };
            } else {
                // 3번째 줄 이하 깊이는 무작위 분포 구성
                const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
                worldMap[key] = { type: BLOCK_TYPES[randomType], damage: 0 };
            }
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터 설정 (정면 피카츄 및 서바이벌 스탯) ---
const player = {
    x: 0, 
    y: (GROUND_START_ROW * BLOCK_SIZE) - 100, 
    baseWidth: 48,
    baseHeight: 52,
    width: 48,
    height: 52,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 5.5,
    jumpForce: 10.5, // 1칸(60px)만 점프 가능하도록 제어 고정
    grounded: false,
    isCrouching: false,
    
    // 서바이벌 시스템 변수 (요청 수치 고정)
    health: 13,        // 최대 목숨 13칸
    hunger: 13,        // 최대 배고픔 13칸 (0.5 단위 제어 가능)
    highestY: 0        // 낙하 데미지 계산을 위한 최고 점프 지점 추적 변수
};

// [시간 시스템] 3분에 반 칸(0.5)씩 자동으로 배고픔이 닳는 타이머 연동
setInterval(() => {
    if (player.hunger > 0) {
        player.hunger -= 0.5; // 반 칸 감소
        if (player.hunger < 0) player.hunger = 0;
    }
}, 3 * 60 * 1000); // 3분 = 180,000ms

// --- 3. 카메라 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 키보드 및 마우스 입력 ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') { key = ' '; e.preventDefault(); }
    if (e.key === 'Shift') { key = 'shift'; e.preventDefault(); }

    if (key in keys) {
        keys[key] = true;
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
            player.highestY = player.y; // 점프 순간 높이 기록 시작
        }
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

function checkCollision(p, b) {
    return p.x < b.x + b.width && p.x + p.width > b.x && p.y < b.y + b.height && p.y + p.height > b.y;
}

// --- 5. 실시간 물리 로직 및 충돌 처리 ---
function update() {
    if (player.isCrouching) {
        player.height = player.baseHeight * 0.65;
        player.speed = 3.2;
    } else {
        player.height = player.baseHeight;
        player.speed = 5.5;
    }

    if (keys.d) player.dx = player.speed;
    else if (keys.a) player.dx = -player.speed;
    else player.dx = 0;

    player.dy += GRAVITY;

    // 공중에 떠 있는 동안 가장 높은 높이(가장 작은 Y값)를 지속 추적 갱신
    if (!player.grounded && player.y < player.highestY) {
        player.highestY = player.y;
    }

    const startRow = Math.floor((player.y - 200) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 200) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 200) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 200) / BLOCK_SIZE);

    // X축 충돌 검사
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // Y축 충돌 검사 및 낙하 데미지 정밀 연산
    const wasInAir = !player.grounded;
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) { // 하강 중 착지 완료
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;

                        // [조건 연산] 공중에 떠있다가 바닥에 닿은 순간 낙하 거리 측정
                        if (wasInAir) {
                            const fallDistance = player.y - player.highestY;
                            // 블록 5칸 이상의 높이 = 5 * 60px = 300px 이상 추락했을 경우
                            if (fallDistance >= 300) {
                                player.health -= 1; // 목숨 1칸 감점
                                if (player.health < 0) player.health = 0;
                            }
                            // 착지했으므로 최고 높이 추적 리셋
                            player.highestY = player.y;
                        }
                    } else if (player.dy < 0) { // 상승 중 천장 부딪힘
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    camera.update();

    // 마우스 실시간 월드 채굴 파괴
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 25) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null;
            if (targetR === GROUND_START_ROW) {
                decorationMap[`${targetR - 1},${targetC}`] = null;
            }
        }
    }
}

// --- 6. 화면 그래픽 드로잉 기술부 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // [월드 카메라 공간 레이어] 시작
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 2;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 4;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 2;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 4;

    // A. 무작위 구름 그리기
    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            if (getCloud(r, c)) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE + 10, BLOCK_SIZE * 2, BLOCK_SIZE * 0.8);
                ctx.fillRect(c * BLOCK_SIZE + 20, r * BLOCK_SIZE - 10, BLOCK_SIZE * 1.3, BLOCK_SIZE * 0.8);
            }
        }
    }

    // B. 지표면 무작위 꽃과 잔디 드로잉
    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const deco = getDecoration(r, c);
            const dx = c * BLOCK_SIZE;
            const dy = r * BLOCK_SIZE;
            
            if (deco === 'LONG_GRASS') {
                ctx.fillStyle = '#218c74'; 
                ctx.fillRect(dx + 15, dy + 20, 6, 40);
                ctx.fillRect(dx + 30, dy + 10, 7, 50);
                ctx.fillRect(dx + 45, dy + 25, 6, 35);
            } else if (deco === 'RED_FLOWER') {
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(dx + 27, dy + 25, 6, 35);
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(dx + 20, dy + 10, 20, 15);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(dx + 27, dy + 15, 6, 5);
            } else if (deco === 'YEL_FLOWER') {
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(dx + 27, dy + 25, 6, 35);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(dx + 20, dy + 10, 20, 15);
                ctx.fillStyle = '#e67e22'; ctx.fillRect(dx + 27, dy + 15, 6, 5);
            }
        }
    }

    // C. 마인크래프트 지형 블록 그리기
    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 내부 고유 도트 무늬 디테일
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 12, by + 16, 10, 10);
                ctx.fillRect(bx + 36, by + 36, 12, 10);

                // 전체 격자선 테두리
                ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 균열 금 크랙
                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 30, by + 30);
                        ctx.moveTo(bx + 50, by + 10); ctx.lineTo(bx + 30, by + 30);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 30, by + 30); ctx.lineTo(bx + 25, by + 55);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // D. 정면을 주시하는 피카츄 묘사 레이어
    ctx.save();
    ctx.translate(player.x, player.y);
    const hRatio = player.height / player.baseHeight;

    ctx.fillStyle = player.color; // 몸통 기본 사각형
    ctx.fillRect(0, 14 * hRatio, player.width, player.height - (14 * hRatio));

    ctx.fillStyle = '#573d26'; // 정면이라 대칭구조로 양 끝에 살짝 스치는 등 줄무늬
    ctx.fillRect(0, 28 * hRatio, 3, 6 * hRatio);
    ctx.fillRect(player.width - 3, 28 * hRatio, 3, 6 * hRatio);

    ctx.fillStyle = player.color; // 양쪽 정면 노란 귀
    ctx.fillRect(4, 0, 10, 14 * hRatio);
    ctx.fillRect(player.width - 14, 0, 10, 14 * hRatio);
    
    ctx.fillStyle = '#000'; // 귀 끝 검은 도트포인트
    ctx.fillRect(4, 0, 10, 5 * hRatio);
    ctx.fillRect(player.width - 14, 0, 10, 5 * hRatio);

    if (player.isCrouching) { // Shift 일자눈
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(8, 22 * hRatio); ctx.lineTo(16, 22 * hRatio);
        ctx.moveTo(player.width - 16, 22 * hRatio); ctx.lineTo(player.width - 8, 22 * hRatio);
        ctx.stroke();
    } else { // 기본 눈동자 동그라미 두 개
        ctx.fillStyle = '#000';
        ctx.fillRect(9, 21, 6, 6);
        ctx.fillRect(player.width - 15, 21, 6, 6);
    }

    ctx.fillStyle = '#FF0000'; // 양 볼 대칭 볼터치
    ctx.fillRect(2, 30 * hRatio, 7, 7 * hRatio);
    ctx.fillRect(player.width - 9, 30 * h
