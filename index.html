<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무한 피카츄 마인크래프트 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* 카메라 시스템이 있으므로 브라우저 스크롤은 숨김 */
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 기본 설정 및 무한 지형 관리 ---
const BLOCK_SIZE = 50; 
const GRAVITY = 0.5;

// 블록 종류 정의
const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 2차원 해시 맵 형태를 사용하여 메모리 제한 없이 무한 지형(좌우/아래) 저장
const worldMap = {}; 
const GROUND_START_ROW = 25; // 지형이 생성되기 시작하는 기준 Y축 칸(행) 위치

// 특정 좌표(r, c)의 블록을 가져오거나 무한 생성하는 함수
function getBlock(r, c) {
    // 기준선(25행) 이상이거나 아래 방향(r >= 25)으로 내려갈 때만 땅을 생성
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            // 아직 생성되지 않은 새로운 구역이라면 무작위로 광석 배치 생성
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            worldMap[key] = {
                type: BLOCK_TYPES[randomType],
                damage: 0
            };
        }
        return worldMap[key];
    }
    return null; // 25행보다 위쪽은 언제나 맑은 하늘
}

// --- 2. 캐릭터(피카츄) 설정 ---
const player = {
    x: 1000, // 카메라 중심을 위해 캔버스 중앙 근처에서 시작
    y: (GROUND_START_ROW * BLOCK_SIZE) - 100,
    baseWidth: 40,
    baseHeight: 44,
    width: 40,
    height: 44,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 13,
    grounded: false,
    facing: 'right',
    isCrouching: false // 웅크리기 상태 변수
};

// --- 3. 카메라 설정 ---
const camera = {
    x: 0,
    y: 0,
    // 캐릭터가 화면 중심에 오도록 부드럽게 추적
    update: function() {
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 키보드 및 마우스 입력 제어 ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = true;

        // [W 또는 Space] 멀티 점프키 구현
        if ((key === 'w' || key === ' ') && player.grounded) {
            // 웅크린 상태에서는 조금 덜 점프되게 하거나 기본 점프 적용
            player.dy = -player.jumpForce;
            player.grounded = false;
        }

        // [Shift] 웅크리기 시동
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;

        // [Shift] 웅크리기 해제
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

// 마우스 월드 좌표(카메라 계산 적용) 변환 처리
canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    // 화면상의 마우스 좌표에 카메라 위치를 더해 절대적인 월드 맵 좌표로 변환
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

// --- 5. AABB 충돌 판정 공식 ---
function checkCollision(p, b) {
    return p.x < b.x + b.width &&
           p.x + p.width > b.x &&
           p.y < b.y + b.height &&
           p.y + p.height > b.y;
}

// --- 6. 핵심 물리 업데이트 및 무한 충돌 검사 로직 ---
function update() {
    // 웅크리기 상태에 따른 높이 및 속도 실시간 조절
    if (player.isCrouching) {
        player.height = player.baseHeight * (2 / 3); // 키가 2/3로 눌림
        player.speed = 3; // 웅크리면 이동속도 감소 디테일
    } else {
        player.height = player.baseHeight;
        player.speed = 6;
    }

    // 좌우 이동 제어
    if (keys.d) {
        player.dx = player.speed;
        player.facing = 'right';
    } else if (keys.a) {
        player.dx = -player.speed;
        player.facing = 'left';
    } else {
        player.dx = 0;
    }

    player.dy += GRAVITY;

    // 현재 플레이어 주변의 블록 범위만 동적으로 계산하여 연산 효율 극대화 (랙 방지)
    const startRow = Math.floor((player.y - 100) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 150) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 100) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 100) / BLOCK_SIZE);

    // [X축 처리] 이동 및 벽 충돌
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // [Y축 처리] 이동 및 바닥/천장 착지
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) {
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) {
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    // 카메라 위치 갱신
    camera.update();

    // --- [마우스 무한 블록 파괴 로직] ---
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 30) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null; // 해당 좌표 블록 완전 파괴
        }
    }

    // 마우스를 뗀 다른 블록들의 실시간 균열 회복
    // 플레이어 시야 반경 내만 스캔하여 최적화
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const b = getBlock(r, c);
            if (b && (r !== targetR || c !== targetC || !mouse.isDown)) {
                if (b.damage > 0) b.damage -= 0.5;
            }
        }
    }
}

// --- 7. 화면 렌더링 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // 전체 화면을 카메라가 반대 방향으로 평행 이동시켜 스크롤 효과 연출
    ctx.translate(-camera.x, -camera.y);

    // 카메라 시야 격자 범위 안의 블록들만 실시간으로 호출해 그리기
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 8, by + 10, 10, 10);
                ctx.fillRect(bx + 28, by + 26, 12, 10);

                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 균열 그리기
                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.65)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 25, by + 25);
                        ctx.moveTo(bx + 40, by + 10); ctx.lineTo(bx + 25, by + 25);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 25, by + 25); ctx.lineTo(bx + 20, by + 45);
                        ctx.moveTo(bx + 10, by + 35); ctx.lineTo(bx + 35, by + 40);
                    }
                    if (dmg >= 25) {
                        ctx.moveTo(bx + 5, by + 20); ctx.lineTo(bx + 45, by + 20);
                        ctx.moveTo(bx + 45, by + 5); ctx.lineTo(bx + 5, by + 45);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // 피카츄 그리기
    ctx.save();
    if (player.facing === 'left') {
        ctx.translate(player.x + player.width, player.y);
        ctx.scale(-1, 1);
    } else {
        ctx.translate(player.x, player.y);
    }

    // 웅크리기 비율 계산용 변수
    const hRatio = player.height / player.baseHeight;

    // 노란색 몸통 (웅크릴 때 Y축 압축율 반영)
    ctx.fillStyle = player.color;
    ctx.fillRect(0, 12 * hRatio, player.width, player.height - (12 * hRatio));

    // 귀 (웅크려도 귀는 그대로 유지되도록 설정)
    ctx.fillRect(4, 0, 8, 12 * hRatio);
    ctx.fillRect(player.width - 12, 2 * hRatio, 8, 10 * hRatio);
    ctx.fillStyle = '#000';
    ctx.fillRect(4, 0, 8, 4 * hRatio);
    ctx.fillRect(player.width - 12, 2 * hRatio, 8, 4 * hRatio);

    // [눈 그리기 조건 분기] 웅크릴 땐 ㅡㅡ 눈 모양 표현
    ctx.fillStyle = '#000';
    if (player.isCrouching) {
        // 일자눈 ㅡ 모양 장식
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
        ctx.beginPath();
        ctx.moveTo(player.width - 16, 18 * hRatio);
        ctx.lineTo(player.width - 8, 18 * hRatio);
        ctx.stroke();
    } else {
        // 일반 동그란 눈
        ctx.fillRect(player.width - 14, 18, 5, 5);
    }

    // 빨간색 볼터치
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(player.width - 10, 24 * hRatio, 6, 6 * hRatio);

    // 등 줄무늬
    ctx.fillStyle = '#573d26';
    ctx.fillRect(4, 22 * hRatio, 6, 4 * hRatio);
    ctx.fillRect(4, 30 * hRatio, 6, 4 * hRatio);

    ctx.restore(); // 피카츄 반전 복구
    ctx.restore(); // 카메라 변환 복구
}

// --- 8. 엔진 작동 ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
