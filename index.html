<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 마인크래프트 - 서바이벌 완벽 구동본</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1200" height="800"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 기본 설정 및 상수 ---
const BLOCK_SIZE = 60; 
const GRAVITY = 0.6;
const GROUND_START_ROW = 8; // 지표면이 생성되는 Y축 위치

// 블록 종류 및 색상 정의
const BLOCK_TYPES = {
    GRASS:   { main: '#2ecc71', detail: '#27ae60' }, // 맨 위 전용 초록 잔디
    DIRT:    { main: '#866043', detail: '#573d26' }, // 일반 흙
    STONE:   { main: '#737373', detail: '#525252' }, // 돌
    COAL:    { main: '#3c3c3c', detail: '#111111' }, // 석탄
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }  // 다이아몬드
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 데이터 테이블 안전 생성
const worldMap = {}; 
function getBlock(r, c) {
    // 무한 맵 범위를 안전하게 처리하기 위한 조건식
    if (r >= GROUND_START_ROW && r < 50 && c > -100 && c < 100) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            if (r === GROUND_START_ROW) {
                // [요청 반영] 맨 위 첫 번째 줄은 무조건 초록색 잔디블록으로만 설정
                worldMap[key] = { type: BLOCK_TYPES.GRASS, damage: 0 };
            } else if (r === GROUND_START_ROW + 1) {
                worldMap[key] = { type: BLOCK_TYPES.DIRT, damage: 0 };
            } else {
                const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
                worldMap[key] = { type: BLOCK_TYPES[randomType], damage: 0 };
            }
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 플레이어 데이터 및 서바이벌 시스템 스탯 ---
const player = {
    x: 300, 
    y: (GROUND_START_ROW * BLOCK_SIZE) - 60, // 지표면 바로 위에 안착 스폰
    baseWidth: 50,
    baseHeight: 55,
    width: 50,
    height: 55,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 5.5,
    jumpForce: 12,
    grounded: false,
    isCrouching: false,
    
    // [요청 반영] 각각 우측 상단 고정 13칸 스탯
    health: 13,        
    hunger: 13,        
    highestY: 0        // 낙하 대미지용 최고 높이 추적 변수
};

// [배고픔 시스템] 게임 실행 후 정확히 3분마다 반 칸(0.5)씩 안전하게 감소
setInterval(() => {
    if (player.hunger > 0) {
        player.hunger -= 0.5;
        if (player.hunger < 0) player.hunger = 0;
    }
}, 3 * 60 * 1000
