<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 무한 지형 마인크래프트 (오류 수정판)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* 카메라 시스템 구동을 위해 브라우저 스크롤바 제거 */
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 기본 게임 환경 설정 ---
const BLOCK_SIZE = 50; 
const GRAVITY = 0.5;

const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 2차원 해시 구조의 무한 월드 맵 저장소
const worldMap = {}; 
const GROUND_START_ROW = 15; // 땅이 시작되는 세로 격자 기준선 (0~14층은 하늘)

// [오류 수정 및 보강] 캐릭터의 현재 위치에 맞춰 앞(좌우)과 아래에 무한 지형을 생성하는 함수
function getBlock(r, c) {
    // 땅 시작 기준선 이하로 내려가면 무조건 무작위 블록을 자동으로 실시간 생성
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            worldMap[key] = {
                type: BLOCK_TYPES[randomType],
                damage: 0
            };
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터(피카츄) 스펙 및 시작 좌표 최적화 ---
const player = {
    // 캔버스 중심 부근에서 시작
    x: 1000, 
    // [중요 고정] 땅이 바로 시작되는 15번째 줄 바로 위에 피카츄가 서 있도록 설정 (하늘색 화면 증상 원천 차단)
    y: (GROUND_START_ROW * BLOCK_SIZE) - 60,
    baseWidth: 40,
    baseHeight: 44,
    width: 40,
    height: 44,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 13,
    grounded: false,
    facing: 'right',
    isCrouching: false
};

// --- 3. 부드러운 카메라 추적 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        // 플레이어 캐릭터가 화면 정중앙(2000x1500의 가운데)에 정확히 오도록 카메라 고정
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 조작 입력 처리 통합 및 간섭 차단 (W, Space, Shift 완벽 연동) ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') {
        key = ' ';
        e.preventDefault(); // 스페이스바를 누를 때 웹브라우저 창이 아래로 내려가는 현상 방지
    }
    if (e.key === 'Shift') {
        key = 'shift';
        e.preventDefault(); // 쉬프트 단축키 간섭 방지
    }

    if (key in keys) {
        keys[key] = true;

        // [W] 또는 [Space] 중 어느 것을 눌러도 서 있는 상태라면 점프 작동
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }

        // [Shift]를 누르고 있으면 즉시 웅크리기 활성화
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;

        // [Shift]를 떼면 즉시 웅크리기 해제
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

// 마우스 클릭 및 좌표 갱신 (카메라 스크롤 보정 적용)
canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    // 마우스의 절대적인 월드 좌표 = 화면 좌표 + 카메라 이동값
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

// 사각형 간의 충돌 검사 알고리즘 (AABB)
function checkCollision(p, b) {
    return p.x < b.x + b.width &&
           p.x + p.width > b.x &&
           p.y < b.y + b.height &&
           p.y + p.height > b.y;
}

// --- 5. 실시간 물리 시스템 및 지형 무한 갱신 루프 ---
function update() {
    // Shift 상태에 따라 실시간 캐릭터 충돌 높이 및 속도 조절
    if (player.isCrouching) {
        player.height = player.baseHeight * (2 / 3); // 원래 키의 2/3로 강제 축소
        player.speed = 3.5;                         // 살금살금 기어가기 속도
    } else {
        player.height = player.baseHeight;
        player.speed = 6;
    }

    // A, D 좌우 이동 연산
    if (keys.d) {
        player.dx = player.speed;
        player.facing = 'right';
    } else if (keys.a) {
        player.dx = -player.speed;
        player.facing = 'left';
    } else {
        player.dx = 0;
    }

    player.dy += GRAVITY;

    // 플레이어 주변 반경 5칸 이내의 블록만 한정해서 스캔 (무한 맵 연산 랙 제거 최적화)
    const startRow = Math.floor((player.y - 150) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 200) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 150) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 150) / BLOCK_SIZE);

    // [X축 이동 및 블록 충돌 막기 처리]
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // [Y축 이동 및 바닥 착지/천장 막기 처리]
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) { // 하강 중 착지
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) { // 상승 중 천장에 머리 부딪힘
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    // 캐릭터 실시간 위치를 기준으로 카메라 초점 추적
    camera.update();

    // --- 마우스 꾹 누를 때 블록 실시간 파괴 로직 ---
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 30) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null; // 영구 제거 (빈 공기 칸으로 변함)
        }
    }

    // 화면 시야 영역 내 블록 균열 상태 자동 회복 로직
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const b = getBlock(r, c);
            if (b && (r !== targetR || c !== targetC || !mouse.isDown)) {
                if (b.damage > 0) b.damage -= 0.5;
            }
        }
    }
}

// --- 6. 그래픽 및 캐릭터 드로잉 처리 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // 캔버스 공간 자체를 카메라 역방향으로 이동시켜 부드러운 카메라 스크롤 구현
    ctx.translate(-camera.x, -camera.y);

    // 현재 카메라 스크롤 시야 안에 들어와 있는 블록들만 선별적으로 그리기
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                // 블록 바탕 채우기
                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 픽셀 무늬 효과
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 8, by + 10, 10, 10);
                ctx.fillRect(bx + 28, by + 26, 12, 10);

                // 블록 격자선
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 마구 갈라지는 마인크래프트식 금 크랙 연출
                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 25, by + 25);
                        ctx.moveTo(bx + 40, by + 10); ctx.lineTo(bx + 25, by + 25);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 25, by + 25); ctx.lineTo(bx + 20, by + 45);
                        ctx.moveTo(bx + 10, by + 35); ctx.lineTo(bx + 35, by + 40);
                    }
                    if (dmg >= 25) {
                        ctx.moveTo(bx + 5, by + 20); ctx.lineTo(bx + 45, by + 20);
                        ctx.moveTo(bx + 45, by + 5); ctx.lineTo(bx + 5, by + 45);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // 피카츄 캐릭터 레이어 드로잉
    ctx.save();
    if (player.facing === 'left') {
        ctx.translate(player.x + player.width, player.y);
        ctx.scale(-1, 1); // 왼쪽 이동 시 좌우 반전
    } else {
        ctx.translate(player.x, player.y);
    }

    const hRatio = player.height / player.baseHeight;

    // 1) 노란색 몸통 (웅크렸을 시 Y축 변형 배율 적용)
    ctx.fillStyle = player.color;
    ctx.fillRect(0, 12 * hRatio, player.width, player.height - (12 * hRatio));

    // 2) 쫑긋 솟은 귀 디자인
    ctx.fillRect(4, 0, 8, 12 * hRatio);
    ctx.fillRect(player.width - 12, 2 * hRatio, 8, 10 * hRatio);
    ctx.fillStyle = '#000';
    ctx.fillRect(4, 0, 8, 4 * hRatio);
    ctx.fillRect(player.width - 12, 2 * hRatio, 8, 4 * hRatio);

    // 3) [눈 그리기] Shift 판정에 따른 눈 모양 교체 실현
    if (player.isCrouching) {
        // Shift 작동 시 ㅡㅡ 일자눈 눈 표현
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(player.width - 17, 18 * hRatio);
        ctx.lineTo(player.width - 7, 18 * hRatio);
        ctx.stroke();
    } else {
        // 평상시 동그랗고 귀여운 눈
        ctx.fillStyle = '#000';
        ctx.fillRect(player.width - 14, 18, 5, 5);
    }

    // 4) 시그니처 빨간 볼터치
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(player.width - 10, 24 * hRatio, 6, 6 * hRatio);

    // 5) 등 뒤의 갈색 줄무늬
    ctx.fillStyle = '#573d26';
    ctx.fillRect(4, 22 * hRatio, 6, 4 * hRatio);
    ctx.fillRect(4, 30 * hRatio, 6, 4 * hRatio);

    ctx.restore();
    ctx.restore();
}

// 실시간 애니메이션 루프 구동
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
