<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 마인크래프트 - 서바이벌 최종 수정</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 월드 기본 하늘 배경색 */
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1200" height="800"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 월드 및 블록 설정 ---
const BLOCK_SIZE = 60; 
const GRAVITY = 0.6;

// 블록 종류 및 디자인 색상
const BLOCK_TYPES = {
    GRASS:   { main: '#2ecc71', detail: '#27ae60' }, // 최상단 레이어 전용 순수 잔디블록
    DIRT:    { main: '#866043', detail: '#573d26' }, // 일반 흙
    STONE:   { main: '#737373', detail: '#525252' }, // 돌
    COAL:    { main: '#3c3c3c', detail: '#111111' }, // 석탄
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }  // 다이아몬드
};
const RANDOM_BLOCKS = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 에러 방지를 위해 확정형 대형 맵 배열 생성 (행 20 x 열 1000)
const MAP_ROWS = 20;
const MAP_COLS = 1000;
const GROUND_START_ROW = 8; // 8번째 줄부터 땅 시작
const mapData = [];

for (let r = 0; r < MAP_ROWS; r++) {
    mapData[r] = [];
    for (let c = 0; c < MAP_COLS; c++) {
        if (r < GROUND_START_ROW) {
            // 공중은 빈 공간
            mapData[r][c] = null;
        } else if (r === GROUND_START_ROW) {
            // [요청 사항 2] 땅의 가장 위에 있는 줄은 예외 없이 오직 초록색 잔디블록만 생성
            mapData[r][c] = { type: BLOCK_TYPES.GRASS, damage: 0 };
        } else if (r === GROUND_START_ROW + 1) {
            // 잔디 바로 밑은 무조건 흙
            mapData[r][c] = { type: BLOCK_TYPES.DIRT, damage: 0 };
        } else {
            // 그 이하 깊은 곳은 무작위 광물 및 돌 배치
            const randType = RANDOM_BLOCKS[Math.floor(Math.random() * RANDOM_BLOCKS.length)];
            mapData[r][c] = { type: BLOCK_TYPES[randType], damage: 0 };
        }
    }
}

// --- 2. 플레이어 캐릭터 및 스탯 설정 ---
const player = {
    // 맵의 중앙 즈음 안전한 잔디 땅 위에 확실하게 배치 (하늘색 버그 원천 차단)
    x: 500 * BLOCK_SIZE, 
    y: (GROUND_START_ROW * BLOCK_SIZE) - 60, 
    baseWidth: 50,
    baseHeight: 55,
    width: 50,
    height: 55,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 5.5,
    jumpForce: 12,
    grounded: false,
    isCrouching: false,
    
    // [요청 사항 1] 각각 고정 13칸 스탯
    health: 13,        
    hunger: 13,        
    highestY: 0        // 낙하 대미지 계산용 변수
};

// [배고픔 시스템] 3분(180000ms)마다 정확히 반 칸(0.5)씩 감소
setInterval(() => {
    if (player.hunger > 0) {
        player.hunger -= 0.5;
        if (player.hunger < 0) player.hunger = 0;
    }
}, 3 * 60 * 1000);

// --- 3. 카메라 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        // 캐릭터가 항상 화면 중심 근처에 오도록 카메라 이동
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
        
        // 맵 경계선 이탈 방지 한계 설정
        if (this.x < 0) this.x = 0;
        if (this.x > (MAP_COLS * BLOCK_SIZE) - canvas.width) this.x = (MAP_COLS * BLOCK_SIZE) - canvas.width;
        if (this.y < 0) this.y = 0;
        if (this.y > (MAP_ROWS * BLOCK_SIZE) - canvas.height) this.y = (MAP_ROWS * BLOCK_SIZE) - canvas.height;
    }
};

// --- 4. 조작 및 마우스 입력 ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') { key = ' '; e.preventDefault(); }
    if (e.key === 'Shift') { key = 'shift'; e.preventDefault(); }

    if (key in keys) {
        keys[key] = true;
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
            player.highestY = player.y; // 뛰어오른 시점 높이 기록
        }
        if (key === 'shift') player.isCrouching = true;
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;
        if (key === 'shift') player.isCrouching = false;
    }
});

canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

function checkCollision(p, b) {
    return p.x < b.x + b.width && p.x + p.width > b.x && p.y < b.y + b.height && p.y + p.height > b.y;
}

// --- 5. 실시간 물리 연산 ---
function update() {
    // 웅크리기 상태 크기 및 속도 조절
    if (player.isCrouching) {
        player.height = player.baseHeight * 0.75;
        player.speed = 3.2;
    } else {
        player.height = player.baseHeight;
        player.speed = 5.5;
    }

    // 좌우 이동
    if (keys.d) player.dx = player.speed;
    else if (keys.a) player.dx = -player.speed;
    else player.dx = 0;

    player.dy += GRAVITY;

    // 공중 낙하 중 최고 도달점 기록 (Y는 작을수록 높은 곳)
    if (!player.grounded && player.y < player.highestY) {
        player.highestY = player.y;
    }

    // 플레이어 주변 범위만 안전 충돌 검사
    const startRow = Math.max(0, Math.floor((player.y - 120) / BLOCK_SIZE));
    const endRow = Math.min(MAP_ROWS - 1, Math.floor((player.y + 120) / BLOCK_SIZE));
    const startCol = Math.max(0, Math.floor((player.x - 120) / BLOCK_SIZE));
    const endCol = Math.min(MAP_COLS - 1, Math.floor((player.x + 120) / BLOCK_SIZE));

    // X축 이동 및 충돌
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = mapData[r][c];
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // Y축 이동 및 충돌 + 낙하 데미지 연산
    const wasInAir = !player.grounded;
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = mapData[r][c];
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) { // 착지
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;

                        // 5칸(300px) 이상 높이에서 추락 후 착지 시 목숨 1칸 차감
                        if (wasInAir) {
                            const fallDistance = player.y - player.highestY;
                            if (fallDistance >= 300) {
                                player.health -= 1;
                                if (player.health < 0) player.health = 0;
                            }
                            player.highestY = player.y;
                        }
                    } else if (player.dy < 0) { // 천장 부딪힘
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    camera.update();

    // 마우스 채굴 블록 파괴
    if (mouse.isDown) {
        let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
        let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
        if (targetR >= 0 && targetR < MAP_ROWS && targetC >= 0 && targetC < MAP_COLS) {
            const activeBlock = mapData[targetR][targetC];
            if (activeBlock) {
                activeBlock.damage += 1;
                if (activeBlock.damage >= 25) { // 일정 이상 타격 시 블록 파괴
                    mapData[targetR][targetC] = null;
                }
            }
        }
    }
}

// --- 6. 화면 렌더링 그리기 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // [카메라 레이어 적용 시작]
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 현재 화면에 보이는 블록 영역만 계산해서 그리기
    const drawStartRow = Math.max(0, Math.floor(camera.y / BLOCK_SIZE));
    const drawEndRow = Math.min(MAP_ROWS - 1, Math.floor((camera.y + canvas.height) / BLOCK_SIZE) + 1);
    const drawStartCol = Math.max(0, Math.floor(camera.x / BLOCK_SIZE));
    const drawEndCol = Math.min(MAP_COLS - 1, Math.floor((camera.x + canvas.width) / BLOCK_SIZE) + 1);

    for (let r = drawStartRow; r <= drawEndRow; r++) {
        for (let c = drawStartCol; c <= drawEndCol; c++) {
            const blockData = mapData[r][c];
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                // 블록 본체 그리기
                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 내부 무늬 디테일 효과
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 12, by + 10, 12, 10);
                ctx.fillRect(bx + 35, by + 35, 12, 10);

                // 연한 테두리선
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 1;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 채굴 중인 블록에 균열 금 표시
                if (blockData.damage > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(bx + 6, by + 6); ctx.lineTo(bx + 54, by + 54);
                    ctx.stroke();
                }
            }
        }
    }

    // 피카츄 캐릭터 드로잉
    ctx.save();
    ctx.translate(player.x, player.y);
    const ratioY = player.height / player.baseHeight;

    ctx.fillStyle = player.color; // 몸통 바디
    ctx.fillRect(0, 14 * ratioY, player.width, player.height - (14 * ratioY));

    ctx.fillStyle = '#573d26'; // 갈색 줄무늬 디테일
    ctx.fillRect(0, 26 * ratioY, 3, 6 * ratioY);
    ctx.fillRect(player.width - 3, 26 * ratioY, 3, 6 * ratioY);

    ctx.fillStyle = player.color; // 세운 양 귀
    ctx.fillRect(4, 0, 10, 14 * ratioY);
    ctx.fillRect(player.width - 14, 0, 10, 14 * ratioY);
    ctx.fillStyle = '#000'; // 귀 끝 검은색 마감
    ctx.fillRect(4, 0, 10, 5 * ratioY);
    ctx.fillRect(player.width - 14, 0, 10, 5 * ratioY);

    if (player.isCrouching) {
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3.5; ctx.beginPath();
        ctx.moveTo(8, 22 * ratioY); ctx.lineTo(16, 22 * ratioY);
        ctx.moveTo(player.width - 16, 22 * ratioY); ctx.lineTo(player.width - 8, 22 * ratioY);
        ctx.stroke();
    } else {
        ctx.fillStyle = '#000'; // 두 눈
        ctx.fillRect(9, 21 * ratioY, 6, 6);
        ctx.fillRect(player.width - 15, 21 * ratioY, 6, 6);
    }

    ctx.fillStyle = '#FF0000'; // 빨간 볼터치
    ctx.fillRect(2, 30 * ratioY, 8, 8 * ratioY);
    ctx.fillRect(player.width - 10, 30 * ratioY, 8, 8 * ratioY);

    ctx.restore();
    ctx.restore(); // [카메라 레이어 변환 해제 및 완전 복구]

    // --- 7. [요청 사항 1] 오른쪽 상단 고정 UI 디자인 그리기 ---
    drawMinecraftFixedUI();
}

// 오른쪽 상단 화면에 달라붙어 고정되는 정밀 UI 드로우 함수
function drawMinecraftFixedUI() {
    const uiSize = 24;            // 마인크래프트 오리지널 하트/고기 1개의 크기 (블록 1칸 정도 크기감)
    const spacing = 28;           // UI 아이콘끼리의 간격
    const totalUiWidth = 13 * spacing; 
    
    // 화면 우측 상단 기준 정렬 좌표 설정
    const startX = canvas.width - totalUiWidth - 25; 
    const heartY = 25;            // 목숨칸 세로 위치
    const hungerY = 60;           // 배고픔칸 세로 위치 (목숨칸 바로 밑)

    // A. 마인크래프트 스타일 레드 하트 목숨칸 (총 13칸 화면 고정)
    for (let i = 0; i < 13; i++) {
        const hx = startX + (i * spacing);
        const hy = heartY;

        // 검은색 아웃라인 테두리 베이스 형성
        ctx.fillStyle = '#000000';
        ctx.fillRect(hx + 4, hy, 8, 3);
        ctx.fillRect(hx + 12, hy, 8, 3);
        ctx.fillRect(hx, hy + 3, uiSize, 7);
        ctx.fillRect(hx + 2, hy + 10, 20, 3);
        ctx.fillRect(hx + 5, hy + 13, 14, 3);
        ctx.fillRect(hx + 10, hy + 16, 4, 3);

        // 빈 하트일 때 기본 바탕 회색 도트
        ctx.fillStyle = '#333333';
        ctx.fillRect(hx + 5, hy + 2, 3, 1);
        ctx.fillRect(hx + 13, hy + 2, 3, 1);
        ctx.fillRect(hx + 2, hy + 5, 20, 4);
        ctx.fillRect(hx + 4, hy + 9, 16, 3);

        // 플레이어 현재 잔여 목숨 수치를 검증하여 하트 채우기
        if (i < player.health) {
            ctx.fillStyle = '#ff2222';
            ctx.fillRect(hx + 4, hy, 8, 3);
            ctx.fillRect(hx + 12, hy, 8, 3);
            ctx.fillRect(hx, hy + 3, uiSize, 7);
            ctx.fillRect(hx + 2, hy + 10, 20, 3);
            ctx.fillRect(hx + 5, hy + 13, 14, 3);
            ctx.fillRect(hx + 10, hy + 16, 4, 3);

            // 원본 특유의 좌측 상단 하얀색 반사광 도트 픽셀 고증
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(hx + 4, hy + 3, 2, 2);
            ctx.fillRect(hx + 6, hy + 1, 2, 2);

            // 입체감 분리선 마감
            ctx.fillStyle = '#000000';
            ctx.fillRect(hx + 11, hy + 3, 2, 3);
        }
    }

    // B. 마인크래프트 스타일 구운 고기 배고픔칸 (총 13칸 화면 고정)
    for (let i = 0; i < 13; i++) {
        const bx = startX + (i * spacing);
        const by = hungerY;

        // 검은색 아웃라인 외곽 테두리 픽셀 형성
        ctx.fillStyle = '#000000';
        ctx.fillRect(bx + 9, by, 9, 3);
        ctx.fillRect(bx + 5, by + 3, 15, 10);
        ctx.fillRect(bx + 1, by + 10, 5, 5);

        // 배고픔 게이지가 닳았을 때의 빈 상태 회색 도트
        ctx.fillStyle = '#333333';
        ctx.fillRect(bx + 7, by + 3, 11, 9);

        const currentPoints = player.hunger * 2;
        const slotPoints = i * 2;

        if (currentPoints >= slotPoints + 2) {
            // 구운 고기가 온전하게 꽉 가득 차 있는 도트 표현
            ctx.fillStyle = '#cbb387'; // 아이보리색 뼈다귀 조각
            ctx.fillRect(bx + 1, by + 12, 3, 3);
            
            ctx.fillStyle = '#9e5627'; // 갈색 고기 핵심 바디
            ctx.fillRect(bx + 7, by + 3, 13, 9);
            ctx.fillRect(bx + 9, by + 1, 7, 2);
            ctx.fillRect(bx + 5, by + 5, 2, 5);

            // 고기 내부 훈제 선무늬 디테일 효과
            ctx.fillStyle = '#5a2e12';
            ctx.fillRect(bx + 11, by + 3, 3, 7);
        } 
        else if (currentPoints === slotPoints + 1) {
            // 배고픔 게이지가 반 칸(0.5)만 남았을 때 절반만 채워지는 도트 표현
            ctx.fillStyle = '#9e5627'; 
            ctx.fillRect(bx + 13, by + 3, 7, 9);
            ctx.fillRect(bx + 13, by + 1, 3, 2);
            
            ctx.fillStyle = '#5a2e12';
            ctx.fillRect(bx + 13, by + 3, 2, 7);
        }
    }
}

// 메인 루프 가동 시작
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
