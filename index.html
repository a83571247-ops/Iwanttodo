<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 무한 마인크래프트 - 디테일 업데이트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 환경 설정 ---
const BLOCK_SIZE = 60; 
const GRAVITY = 0.6;

const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

const worldMap = {}; 
const GROUND_START_ROW = 10; // 지표면 시작 층

// [구름 시스템] 무한 월드용 구름 데이터 저장소 및 난수 생성기
const clouds = {};
function getCloud(r, c) {
    if (r < GROUND_START_ROW - 1) { // 하늘 영역에만 구름 생성
        const key = `${r},${c}`;
        if (clouds[key] === undefined) {
            // 8%의 확률로 구름의 중심점 지정
            clouds[key] = Math.random() < 0.08; 
        }
        return clouds[key];
    }
    return false;
}

// [규칙 추가] 무한 지형 생성 알고리즘 (위에서 2칸까지는 무조건 흙)
function getBlock(r, c) {
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            // GROUND_START_ROW 가 지표면 첫 칸(1번째)이므로, r이 시작점부터 +1인 곳까지는 무조건 흙(DIRT)
            if (r === GROUND_START_ROW || r === GROUND_START_ROW + 1) {
                worldMap[key] = { type: BLOCK_TYPES.DIRT, damage: 0 };
            } else {
                // 3번째 깊이부터는 모든 광물이 무작위로 섞여서 생성됨
                const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
                worldMap[key] = { type: BLOCK_TYPES[randomType], damage: 0 };
            }
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터(정면 피카츄) 설정 ---
const player = {
    x: 0, 
    y: (GROUND_START_ROW * BLOCK_SIZE) - 100, 
    baseWidth: 48,
    baseHeight: 52,
    width: 48,
    height: 52,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 5.5,
    // [규칙 추가] 60px(블록 1칸)만 딱 점프하여 걸칠 수 있도록 수치 고정 최적화
    jumpForce: 10.5, 
    grounded: false,
    isCrouching: false
};

// --- 3. 카메라 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 키보드 및 마우스 입력 처리 ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') { key = ' '; e.preventDefault(); }
    if (e.key === 'Shift') { key = 'shift'; e.preventDefault(); }

    if (key in keys) {
        keys[key] = true;
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

function checkCollision(p, b) {
    return p.x < b.x + b.width && p.x + p.width > b.x && p.y < b.y + b.height && p.y + p.height > b.y;
}

// --- 5. 실시간 물리 및 로직 업데이트 ---
function update() {
    if (player.isCrouching) {
        player.height = player.baseHeight * 0.65;
        player.speed = 3.2;
    } else {
        player.height = player.baseHeight;
        player.speed = 5.5;
    }

    if (keys.d) player.dx = player.speed;
    else if (keys.a) player.dx = -player.speed;
    else player.dx = 0;

    player.dy += GRAVITY;

    const startRow = Math.floor((player.y - 200) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 200) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 200) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 200) / BLOCK_SIZE);

    // X축 충돌 검사
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // Y축 충돌 검사
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) {
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) {
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    camera.update();

    // 실시간 파괴
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 25) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null;
        }
    }
}

// --- 6. 그래픽 렌더링 (구름 및 정면 피카츄 예술 표현) ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 2;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 4;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 2;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 4;

    // A. 무작위 구름 그리기 레이어
    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            if (getCloud(r, c)) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                // 뭉게구름 형태로 주변 격자까지 연결하여 부드럽게 드로잉
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE + 10, BLOCK_SIZE * 2, BLOCK_SIZE * 0.8);
                ctx.fillRect(c * BLOCK_SIZE + 20, r * BLOCK_SIZE - 10, BLOCK_SIZE * 1.3, BLOCK_SIZE * 0.8);
            }
        }
    }

    // B. 마인크래프트 지형 블록 그리기 레이어
    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 10, by + 12, 12, 12);
                ctx.fillRect(bx + 35, by + 32, 14, 12);

                ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 30, by + 30);
                        ctx.moveTo(bx + 50, by + 10); ctx.lineTo(bx + 30, by + 30);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 30, by + 30); ctx.lineTo(bx + 25, by + 55);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // C. [디테일 교체] 완벽한 정면 배치 피카츄 캐릭터 레이어
    ctx.save();
    ctx.translate(player.x, player.y);

    const hRatio = player.height / player.baseHeight;

    // 1) 정면 몸통
    ctx.fillStyle = player.color;
    ctx.fillRect(0, 14 * hRatio, player.width, player.height - (14 * hRatio));

    // 2) 등 뒤의 줄무늬 (정면에서 보았을 때 옆구리에 살짝 걸치도록 양쪽에 배치)
    ctx.fillStyle = '#573d26';
    ctx.fillRect(0, 28 * hRatio, 3, 6 * hRatio);
    ctx.fillRect(player.width - 3, 28 * hRatio, 3, 6 * hRatio);

    // 3) 정면 좌우 쫑긋한 귀 디자인
    ctx.fillStyle = player.color;
    ctx.fillRect(4, 0, 10, 14 * hRatio); // 왼쪽 귀
    ctx.fillRect(player.width - 14, 0, 10, 14 * hRatio); // 오른쪽 귀
    
    ctx.fillStyle = '#000'; // 귀 끝 검은 포인터
    ctx.fillRect(4, 0, 10, 5 * hRatio);
    ctx.fillRect(player.width - 14, 0, 10, 5 * hRatio);

    // 4) 정면 눈동자 배치
    if (player.isCrouching) {
        // Shift를 누르면 웅크리며 정면을 본 채 일자눈(ㅡ ㅡ)으로 변신
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(8, 22 * hRatio); ctx.lineTo(16, 22 * hRatio); // 왼쪽 일자눈
        ctx.moveTo(player.width - 16, 22 * hRatio); ctx.lineTo(player.width - 8, 22 * hRatio); // 오른쪽 일자눈
        ctx.stroke();
    } else {
        // 일반 상태의 동그란 초롱초롱한 두 눈
        ctx.fillStyle = '#000';
        ctx.fillRect(9, 21, 6, 6); // 왼쪽 눈
        ctx.fillRect(player.width - 15, 21, 6, 6); // 오른쪽 눈
    }

    // 5) 시그니처 대칭 정면 볼터치 (양쪽 뺨에 하나씩)
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(2, 30 * hRatio, 7, 7 * hRatio); // 왼쪽 뺨
    ctx.fillRect(player.width - 9, 30 * hRatio, 7, 7 * hRatio); // 오른쪽 뺨

    // 6) 정면 귀여운 시옷(ㅅ) 입 모양 추가
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const mouthY = 32 * hRatio;
    ctx.moveTo(player.width / 2 - 4, mouthY);
    ctx.lineTo(player.width / 2, mouthY + 3 * hRatio);
    ctx.lineTo(player.width / 2 + 4, mouthY);
    ctx.stroke();

    ctx.restore();
    ctx.restore();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
