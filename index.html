<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 무한 마인크래프트 게임 (완벽 오류 수정판)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated; /* 도트 픽셀을 흐림 없이 선명하게 표현 */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 환경 설정 ---
const BLOCK_SIZE = 60; // 가시성을 위해 블록 크기를 60px로 최적화
const GRAVITY = 0.6;

const BLOCK_TYPES = {
    DIRT:    { main: '#866043', detail: '#573d26' },
    STONE:   { main: '#737373', detail: '#525252' },
    COAL:    { main: '#3c3c3c', detail: '#111111' },
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

// 2차원 공간 해시 테이블 (모든 좌표 지원)
const worldMap = {}; 
const GROUND_START_ROW = 10; // 10층 이하(Y축 아래)는 전부 땅으로 생성

// [버그 수정 핵심] 양수, 음수 좌표를 모두 안전하게 문자열 키로 전환하여 블록을 반환하는 함수
function getBlock(r, c) {
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            // 완전히 랜덤하고 무한한 지형 블록 할당
            const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
            worldMap[key] = {
                type: BLOCK_TYPES[randomType],
                damage: 0
            };
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터(피카츄) 스펙 및 초기화 ---
const player = {
    x: 0, // 0번 좌표 기준 중앙 정렬
    y: (GROUND_START_ROW * BLOCK_SIZE) - 100, // 땅 바로 위에 안정적으로 스폰
    baseWidth: 46,
    baseHeight: 50,
    width: 46,
    height: 50,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 15,
    grounded: false,
    facing: 'right',
    isCrouching: false
};

// --- 3. 부드러운 중앙 고정 카메라 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        // 캐릭터를 화면 한가운데에 유지하도록 스크롤 값 추적
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 키보드 및 마우스 입력 처리 (Space, W, Shift 완전 보정) ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') { key = ' '; e.preventDefault(); }
    if (e.key === 'Shift') { key = 'shift'; e.preventDefault(); }

    if (key in keys) {
        keys[key] = true;

        // Space키 또는 W키를 누르면 둘 다 점프 구동
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
        // Shift를 누르면 즉시 웅크리기 진입
        if (key === 'shift') {
            player.isCrouching = true;
        }
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;
        if (key === 'shift') {
            player.isCrouching = false;
        }
    }
});

canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

// 충돌 감지 함수 (AABB)
function checkCollision(p, b) {
    return p.x < b.x + b.width &&
           p.x + p.width > b.x &&
           p.y < b.y + b.height &&
           p.y + p.height > b.y;
}

// --- 5. 게임 물리 연산 및 실시간 청크 생성 업데이트 ---
function update() {
    // 웅크리기(Shift) 발동 시 충돌 판정 크기 축소 디테일
    if (player.isCrouching) {
        player.height = player.baseHeight * 0.65; // 키가 작아짐
        player.speed = 3.5;                      // 느리게 이동
    } else {
        player.height = player.baseHeight;
        player.speed = 6;
    }

    // 움직임 입력
    if (keys.d) {
        player.dx = player.speed;
        player.facing = 'right';
    } else if (keys.a) {
        player.dx = -player.speed;
        player.facing = 'left';
    } else {
        player.dx = 0;
    }

    player.dy += GRAVITY;

    // 플레이어 주변 타일 연산 범위를 여유 있게 설정 (음수 연산 오류 완전 예방)
    const startRow = Math.floor((player.y - 200) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 200) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 200) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 200) / BLOCK_SIZE);

    // X축 이동 및 벽 통과 차단 충돌 검사
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // Y축 이동 및 바닥 착지/머리 천장 충돌 검사
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) {
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    } else if (player.dy < 0) {
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    // 카메라 위치 갱신
    camera.update();

    // 마우스로 땅 파기 무한 채굴 시스템 
    let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
    let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
    const activeBlock = getBlock(targetR, targetC);

    if (mouse.isDown && activeBlock) {
        activeBlock.damage += 1;
        if (activeBlock.damage >= 25) {
            const key = `${targetR},${targetC}`;
            worldMap[key] = null; // 블록 파괴 및 빈 공간 처리
        }
    }
}

// --- 6. 그래픽 및 화면 드로잉 렌더링 ---
function draw() {
    // 하늘색으로 화면 전체 초기화 청소
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // 카메라 좌표만큼 월드 전체를 밀어주어 무한 스크롤 연출
    ctx.translate(-camera.x, -camera.y);

    // 화면 시야(ViewPort) 크기 내에 존재하는 블록들만 실시간 렌더링 (과부하 완벽 방지)
    const camStartRow = Math.floor(camera.y / BLOCK_SIZE) - 1;
    const camEndRow = camStartRow + (canvas.height / BLOCK_SIZE) + 2;
    const camStartCol = Math.floor(camera.x / BLOCK_SIZE) - 1;
    const camEndCol = camStartCol + (canvas.width / BLOCK_SIZE) + 2;

    for (let r = camStartRow; r <= camEndRow; r++) {
        for (let c = camStartCol; c <= camEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                // 블록 본체 메인 색상
                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 픽셀 디테일 포인트 무늬
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 10, by + 12, 12, 12);
                ctx.fillRect(bx + 35, by + 32, 14, 12);

                // 블록 외곽선 격자
                ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 채굴할 때 생기는 균열 금 크랙 비주얼 이펙트
                const dmg = blockData.damage;
                if (dmg > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    if (dmg >= 5) {
                        ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 30, by + 30);
                        ctx.moveTo(bx + 50, by + 10); ctx.lineTo(bx + 30, by + 30);
                    }
                    if (dmg >= 15) {
                        ctx.moveTo(bx + 30, by + 30); ctx.lineTo(bx + 25, by + 55);
                        ctx.moveTo(bx + 10, by + 40); ctx.lineTo(bx + 45, by + 45);
                    }
                    ctx.stroke();
                }
            }
        }
    }

    // --- 피카츄 디자인 캐릭터 드로잉 단계 ---
    ctx.save();
    if (player.facing === 'left') {
        ctx.translate(player.x + player.width, player.y);
        ctx.scale(-1, 1); // 왼쪽 방향 바라볼 시 반전
    } else {
        ctx.translate(player.x, player.y);
    }

    const hRatio = player.height / player.baseHeight;

    // 1) 몸통
    ctx.fillStyle = player.color;
    ctx.fillRect(0, 14 * hRatio, player.width, player.height - (14 * hRatio));

    // 2) 귀 귀끝 포인트 포함
    ctx.fillRect(6, 0, 8, 14 * hRatio);
    ctx.fillRect(player.width - 14, 2 * hRatio, 8, 12 * hRatio);
    ctx.fillStyle = '#000';
    ctx.fillRect(6, 0, 8, 5 * hRatio);
    ctx.fillRect(player.width - 14, 2 * hRatio, 8, 5 * hRatio);

    // 3) [웅크리기 눈동자 분기 보정] Shift 시 ㅡㅡ 일자눈, 평소엔 동그란 눈
    if (player.isCrouching) {
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(player.width - 18, 20 * hRatio);
        ctx.lineTo(player.width - 6, 20 * hRatio);
        ctx.stroke();
    } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(player.width - 15, 20, 6, 6);
    }

    // 4) 빨간 볼터치
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(player.width - 10, 28 * hRatio, 7, 7 * hRatio);

    // 5) 등 무늬 줄줄이
    ctx.fillStyle = '#573d26';
    ctx.fillRect(4, 26 * hRatio, 6, 5 * hRatio);
    ctx.fillRect(4, 36 * hRatio, 6, 5 * hRatio);

    ctx.restore();
    ctx.restore();
}

// 브라우저 프레임 무한 애니메이션 루프 실행
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// 게임 최초 기동 시작
gameLoop();
</script>

</body>
</html>
