<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피카츄 마인크래프트 - 서바이벌 완벽 수정본</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #74b9ff; /* 하늘색 배경 */
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="2000" height="1500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 1. 환경 설정 ---
const BLOCK_SIZE = 60; 
const GRAVITY = 0.6;
const GROUND_START_ROW = 12; // 지표면이 시작되는 맵의 Y축 행 번호

// 블록 색상 디자인 정의
const BLOCK_TYPES = {
    GRASS:   { main: '#2ecc71', detail: '#27ae60' }, // 최상단 레이어 전용 순수 초록 잔디
    DIRT:    { main: '#866043', detail: '#573d26' }, // 일반 흙
    STONE:   { main: '#737373', detail: '#525252' }, // 돌
    COAL:    { main: '#3c3c3c', detail: '#111111' }, // 석탄
    DIAMOND: { main: '#6d8a8c', detail: '#4dedf4' }  // 다이아몬드
};
const BLOCK_LIST = ['DIRT', 'STONE', 'COAL', 'DIAMOND'];

const worldMap = {}; 

// 무한 월드 블록 스폰 함수
function getBlock(r, c) {
    if (r >= GROUND_START_ROW) {
        const key = `${r},${c}`;
        if (worldMap[key] === undefined) {
            if (r === GROUND_START_ROW) {
                // 맨 위 블록은 무조건 초록색깔 잔디블록으로만 구성하도록 고정
                worldMap[key] = { type: BLOCK_TYPES.GRASS, damage: 0 };
            } else if (r === GROUND_START_ROW + 1) {
                worldMap[key] = { type: BLOCK_TYPES.DIRT, damage: 0 };
            } else {
                // 3번째 줄 이하부터 무작위 광물 및 돌 배치
                const randomType = BLOCK_LIST[Math.floor(Math.random() * BLOCK_LIST.length)];
                worldMap[key] = { type: BLOCK_TYPES[randomType], damage: 0 };
            }
        }
        return worldMap[key];
    }
    return null;
}

// --- 2. 캐릭터 데이터 (정면 피카츄 및 마인크래프트 스탯) ---
const player = {
    x: 1000, // 캔버스 가로 중앙 스폰
    y: (GROUND_START_ROW * BLOCK_SIZE) - 150, // 지표면 바로 위 안전 스폰
    baseWidth: 50,
    baseHeight: 55,
    width: 50,
    height: 55,
    color: '#FFDE00',
    dx: 0,
    dy: 0,
    speed: 6,
    jumpForce: 12.5,
    grounded: false,
    isCrouching: false,
    
    // 서바이벌 시스템 변수 설정
    health: 13,        // 13칸의 목숨칸
    hunger: 13,        // 13칸의 배고픔칸
    highestY: 0        // 낙하 대미지 계산용 공중 최고점 기록 변수
};

// [배고픔 타이머 조건] 3분에 반 칸(0.5)씩 닳음
setInterval(() => {
    if (player.hunger > 0) {
        player.hunger -= 0.5;
        if (player.hunger < 0) player.hunger = 0;
    }
}, 3 * 60 * 1000); // 3분 = 180,000 밀리초

// --- 3. 카메라 시스템 ---
const camera = {
    x: 0,
    y: 0,
    update: function() {
        this.x = player.x - canvas.width / 2 + player.width / 2;
        this.y = player.y - canvas.height / 2 + player.height / 2;
    }
};

// --- 4. 키보드 조작 및 마우스 입력 ---
const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
const mouse = { isDown: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') { key = ' '; e.preventDefault(); }
    if (e.key === 'Shift') { key = 'shift'; e.preventDefault(); }

    if (key in keys) {
        keys[key] = true;
        if ((key === 'w' || key === ' ') && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
            player.highestY = player.y; // 점프 순간의 높이를 최고점으로 기록 시작
        }
        if (key === 'shift') player.isCrouching = true;
    }
});

window.addEventListener('keyup', (e) => {
    let key = e.key.toLowerCase();
    if (e.key === ' ') key = ' ';
    if (e.key === 'Shift') key = 'shift';

    if (key in keys) {
        keys[key] = false;
        if (key === 'shift') player.isCrouching = false;
    }
});

canvas.addEventListener('mousedown', (e) => { mouse.isDown = true; updateMousePos(e); });
canvas.addEventListener('mousemove', (e) => { updateMousePos(e); });
window.addEventListener('mouseup', () => { mouse.isDown = false; });

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const canvasX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const canvasY = (e.clientY - rect.top) * (canvas.height / rect.height);
    mouse.worldX = canvasX + camera.x;
    mouse.worldY = canvasY + camera.y;
}

function checkCollision(p, b) {
    return p.x < b.x + b.width && p.x + p.width > b.x && p.y < b.y + b.height && p.y + p.height > b.y;
}

// --- 5. 실시간 게임 엔진 업데이트 ---
function update() {
    // 웅크리기 제어
    if (player.isCrouching) {
        player.height = player.baseHeight * 0.7;
        player.speed = 3.5;
    } else {
        player.height = player.baseHeight;
        player.speed = 6;
    }

    // 좌우 이동
    if (keys.d) player.dx = player.speed;
    else if (keys.a) player.dx = -player.speed;
    else player.dx = 0;

    // 중력 적용
    player.dy += GRAVITY;

    // 공중에 떠 있는 상태라면 계속해서 최고 높은 지점(Y축 값이 가장 작을 때)을 추적 갱신
    if (!player.grounded && player.y < player.highestY) {
        player.highestY = player.y;
    }

    // 캐릭터 주변 안전 반경 블록만 연산 (성능 저하 및 튕김 방지)
    const startRow = Math.floor((player.y - 400) / BLOCK_SIZE);
    const endRow = Math.floor((player.y + 400) / BLOCK_SIZE);
    const startCol = Math.floor((player.x - 400) / BLOCK_SIZE);
    const endCol = Math.floor((player.x + 400) / BLOCK_SIZE);

    // X축 충돌 처리
    player.x += player.dx;
    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dx > 0) player.x = blockObj.x - player.width;
                    else if (player.dx < 0) player.x = blockObj.x + blockObj.width;
                }
            }
        }
    }

    // Y축 충돌 처리 및 낙하 데미지 계산
    const wasInAir = !player.grounded;
    player.y += player.dy;
    player.grounded = false;

    for (let r = startRow; r <= endRow; r++) {
        for (let c = startCol; c <= endCol; c++) {
            const block = getBlock(r, c);
            if (block) {
                const blockObj = { x: c * BLOCK_SIZE, y: r * BLOCK_SIZE, width: BLOCK_SIZE, height: BLOCK_SIZE };
                if (checkCollision(player, blockObj)) {
                    if (player.dy > 0) { // 아래로 떨어지다 착지했을 때
                        player.y = blockObj.y - player.height;
                        player.dy = 0;
                        player.grounded = true;

                        // [낙하 데미지 조건] 공중에 있다가 착지한 순간 낙하 거리 연산
                        if (wasInAir) {
                            const fallDistance = player.y - player.highestY;
                            // 블록 1칸당 60px이므로 5칸 이상 = 300px 이상 추락한 경우
                            if (fallDistance >= 300) {
                                player.health -= 1; // 목숨 1칸 차감
                                if (player.health < 0) player.health = 0;
                            }
                            player.highestY = player.y; // 착지했으므로 기록 초기화
                        }
                    } else if (player.dy < 0) { // 머리가 천장에 부딪힘
                        player.y = blockObj.y + blockObj.height;
                        player.dy = 0;
                    }
                }
            }
        }
    }

    camera.update();

    // 마우스 실시간 블록 부수기
    if (mouse.isDown) {
        let targetR = Math.floor(mouse.worldY / BLOCK_SIZE);
        let targetC = Math.floor(mouse.worldX / BLOCK_SIZE);
        const activeBlock = getBlock(targetR, targetC);
        if (activeBlock) {
            activeBlock.damage += 1;
            if (activeBlock.damage >= 25) { // 내구도 한계 도달 시 파괴
                worldMap[`${targetR},${targetC}`] = null;
            }
        }
    }
}

// --- 6. 그래픽 렌더링 화면 드로우 ---
function draw() {
    // 이전 화면 깨끗하게 지우기
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // [카메라 스크롤 뷰 스페이스 변환]
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 에러를 유발하던 무한 변수 연산을 제거하고, 화면 픽셀 기준으로 렌더링 영역을 안전하게 고정 계산
    const viewStartRow = Math.max(0, Math.floor(camera.y / BLOCK_SIZE) - 2);
    const viewEndRow = viewStartRow + Math.ceil(canvas.height / BLOCK_SIZE) + 4;
    const viewStartCol = Math.floor(camera.x / BLOCK_SIZE) - 2;
    const viewEndCol = viewStartCol + Math.ceil(canvas.width / BLOCK_SIZE) + 4;

    // 지형 블록 그리기
    for (let r = viewStartRow; r <= viewEndRow; r++) {
        for (let c = viewStartCol; c <= viewEndCol; c++) {
            const blockData = getBlock(r, c);
            if (blockData) {
                const block = blockData.type;
                const bx = c * BLOCK_SIZE;
                const by = r * BLOCK_SIZE;

                // 기본 블록 색상
                ctx.fillStyle = block.main;
                ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 블록 픽셀 무늬 디테일
                ctx.fillStyle = block.detail;
                ctx.fillRect(bx + 12, by + 12, 10, 10);
                ctx.fillRect(bx + 36, by + 36, 12, 10);

                // 연한 아웃라인 경계선
                ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                // 채굴 중인 블록의 균열 금 표기
                if (blockData.damage > 0) {
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(bx + 5, by + 5); ctx.lineTo(bx + 55, by + 55);
                    ctx.stroke();
                }
            }
        }
    }

    // 정면 방향 피카츄 그리기
    ctx.save();
    ctx.translate(player.x, player.y);
    const hRatio = player.height / player.baseHeight;

    ctx.fillStyle = player.color; // 몸체 바디
    ctx.fillRect(0, 14 * hRatio, player.width, player.height - (14 * hRatio));

    ctx.fillStyle = '#573d26'; // 양 옆구리 갈색 줄무늬 흔적
    ctx.fillRect(0, 26 * hRatio, 3, 6 * hRatio);
    ctx.fillRect(player.width - 3
